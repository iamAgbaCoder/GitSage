name: GitSage — Unified Production Pipeline

# ──────────────────────────────────────────────────────────────────
# TRIGGERS
# ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, release]
    tags: ["v*"]
  pull_request:
    branches: [main, release]

# Least-privilege permissions
permissions:
  contents: write # required for GitHub Releases
  id-token: write # required for OIDC Trusted Publishing (PyPI)

# Cancel in-flight runs for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────
  # 1. TEST: Verify stability across OS and Python versions
  # ────────────────────────────────────────────────────────────────
  test:
    name: "Test · Python ${{ matrix.python-version }} · ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black .

      - name: Run tests
        run: pytest --cov=./ --cov-report=xml tests/

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ────────────────────────────────────────────────────────────────
  # 2. BUILD DIST: Build sdist and wheel for PyPI
  # ────────────────────────────────────────────────────────────────
  build-dist:
    name: Build PyPI Distribution
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # 3. BUILD BINARIES: Build cross-platform executables
  # ────────────────────────────────────────────────────────────────
  build-binaries:
    name: "Build Binary · ${{ matrix.binary_name }}"
    needs: test
    runs-on: ${{ matrix.runner }}
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: amd64
            binary_name: gitsage-linux-amd64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            binary_name: gitsage-linux-arm64
          - runner: macos-13
            platform: darwin
            arch: amd64
            binary_name: gitsage-darwin-amd64
          - runner: macos-latest
            platform: darwin
            arch: arm64
            binary_name: gitsage-darwin-arm64
          - runner: windows-latest
            platform: windows
            arch: amd64
            binary_name: gitsage-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install pyinstaller

      - name: Build (Unix)
        if: matrix.platform != 'windows'
        run: |
          pyinstaller --onefile --name gitsage --clean --strip cli/main.py
          mv dist/gitsage dist/${{ matrix.binary_name }}
          cd dist && shasum -a 256 ${{ matrix.binary_name }} > ${{ matrix.binary_name }}.sha256

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          pyinstaller --onefile --name gitsage --clean cli/main.py
          Move-Item dist/gitsage.exe dist/${{ matrix.binary_name }}
          cd dist
          $hash = (Get-FileHash ${{ matrix.binary_name }} -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.binary_name }}" | Out-File -Encoding ascii ${{ matrix.binary_name }}.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: |
            dist/${{ matrix.binary_name }}
            dist/${{ matrix.binary_name }}.sha256
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # 4. DEPLOY TESTPYPI: On every push to main
  # ────────────────────────────────────────────────────────────────
  deploy-testpypi:
    name: Publish → TestPyPI
    needs: build-dist
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/gitsage-cli
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # ────────────────────────────────────────────────────────────────
  # 5. DEPLOY PYPI: On release branch or version tag
  # ────────────────────────────────────────────────────────────────
  deploy-pypi:
    name: Publish → PyPI
    needs: build-dist
    if: github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://pypi.org/p/gitsage-cli
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # ────────────────────────────────────────────────────────────────
  # 6. GITHUB RELEASE: Consolidate distribution and binaries
  # ────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [deploy-pypi, build-binaries]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate Checksums
        run: |
          cd artifacts
          cat *.sha256 > checksums.txt

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: "GitSage CLI ${{ github.ref_name }}"
          files: |
            artifacts/*
