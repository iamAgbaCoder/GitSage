name: GitSage AI — CI/CD Pipeline

on:
  push:
    branches: [main, release]
    tags: ["v*"]
  pull_request:
    branches: [main, release]

# Least-privilege permissions
permissions:
  contents: write # required for GitHub Releases
  id-token: write # required for OIDC Trusted Publishing (PyPI)

# Cancel in-flight runs for the same ref so PRs don't queue up
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────
  # 1. Lint + Test matrix
  # ────────────────────────────────────────────────────────────────
  test:
    name: "Test · Python ${{ matrix.python-version }} · ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black .

      - name: Run tests
        run: pytest --cov=./ --cov-report=xml tests/

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ────────────────────────────────────────────────────────────────
  # 2. Build the distribution once (reused by both publish jobs)
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    # Build on every push to main/release and on every version tag
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # 3. Publish to TestPyPI  (every push to main)
  # ────────────────────────────────────────────────────────────────
  deploy-testpypi:
    name: Publish → TestPyPI
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/gitsage

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # ────────────────────────────────────────────────────────────────
  # 4. Publish to production PyPI  (release branch OR version tag)
  # ────────────────────────────────────────────────────────────────
  deploy-pypi:
    name: Publish → PyPI
    needs: build
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://pypi.org/p/gitsage

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # ────────────────────────────────────────────────────────────────
  # 5. GitHub Release  (version tags only)
  # ────────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: deploy-pypi
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          name: "GitSage AI ${{ github.ref_name }}"
