name: GitSage CLI — Binary Release

on:
  push:
    tags:
      - "v*"
    branches:
      - main

# Cancel in-flight runs for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────
  # Build cross-platform binaries
  # ────────────────────────────────────────────────────────────
  build:
    name: "Build · ${{ matrix.binary_name }}"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux AMD64
          - runner: ubuntu-latest
            platform: linux
            arch: amd64
            binary_name: gitsage-linux-amd64
            asset_name: gitsage-linux-amd64

          # Linux ARM64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            binary_name: gitsage-linux-arm64
            asset_name: gitsage-linux-arm64

          # macOS Intel (AMD64)
          - runner: macos-13
            platform: darwin
            arch: amd64
            binary_name: gitsage-darwin-amd64
            asset_name: gitsage-darwin-amd64

          # macOS Apple Silicon (ARM64)
          - runner: macos-latest
            platform: darwin
            arch: arm64
            binary_name: gitsage-darwin-arm64
            asset_name: gitsage-darwin-arm64

          # Windows AMD64
          - runner: windows-latest
            platform: windows
            arch: amd64
            binary_name: gitsage-windows-amd64.exe
            asset_name: gitsage-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install pyinstaller

      - name: Build binary (Unix)
        if: matrix.platform != 'windows'
        run: |
          pyinstaller \
            --onefile \
            --name gitsage \
            --clean \
            --strip \
            cli/main.py
          mv dist/gitsage dist/${{ matrix.binary_name }}

      - name: Build binary (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --name gitsage `
            --clean `
            cli/main.py
          Move-Item dist/gitsage.exe dist/${{ matrix.binary_name }}

      - name: Generate SHA256 checksum (Unix)
        if: matrix.platform != 'windows'
        run: |
          cd dist
          shasum -a 256 ${{ matrix.binary_name }} > ${{ matrix.binary_name }}.sha256
          cat ${{ matrix.binary_name }}.sha256

      - name: Generate SHA256 checksum (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          cd dist
          $hash = (Get-FileHash ${{ matrix.binary_name }} -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.binary_name }}" | Out-File -Encoding ascii ${{ matrix.binary_name }}.sha256
          Get-Content ${{ matrix.binary_name }}.sha256

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: |
            dist/${{ matrix.binary_name }}
            dist/${{ matrix.binary_name }}.sha256
          retention-days: 7
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────
  # Publish to GitHub Releases (tags only)
  # ────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
          merge-multiple: true

      - name: List release assets
        run: ls -lah release-assets/

      - name: Generate combined checksums.txt
        run: |
          cd release-assets
          # Concatenate all per-binary .sha256 files into one master file
          cat *.sha256 > checksums.txt
          echo ""
          echo "=== checksums.txt ==="
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GitSage CLI ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            release-assets/gitsage-linux-amd64
            release-assets/gitsage-linux-amd64.sha256
            release-assets/gitsage-linux-arm64
            release-assets/gitsage-linux-arm64.sha256
            release-assets/gitsage-darwin-amd64
            release-assets/gitsage-darwin-amd64.sha256
            release-assets/gitsage-darwin-arm64
            release-assets/gitsage-darwin-arm64.sha256
            release-assets/gitsage-windows-amd64.exe
            release-assets/gitsage-windows-amd64.exe.sha256
            release-assets/checksums.txt
          body: |
            ## Installation

            **One-line install (macOS & Linux):**
            ```bash
            curl -fsSL https://gitsage-ai.vercel.app/install.sh | bash
            ```

            **Manual download:** Pick the binary for your platform below, verify the checksum, and move it to your `$PATH`.

            | Platform | Binary |
            |----------|--------|
            | Linux x86_64 | `gitsage-linux-amd64` |
            | Linux ARM64 | `gitsage-linux-arm64` |
            | macOS Intel | `gitsage-darwin-amd64` |
            | macOS Apple Silicon | `gitsage-darwin-arm64` |
            | Windows x86_64 | `gitsage-windows-amd64.exe` |

            **Verify checksum (example for Linux AMD64):**
            ```bash
            shasum -a 256 -c gitsage-linux-amd64.sha256
            ```
